spring.application.name=mobiliario-web

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.datasource.initialization-mode=never
server.port=${PORT:8080}

# Agrupar inserciones y actualizaciones
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Ver el log para confirmar que se están enviando por lotes (solo para debug)
spring.jpa.properties.hibernate.generate_statistics=true

logging.level.com.mx.gaby.mobiliario_web=DEBUG
management.endpoints.web.exposure.include=caches,metrics

